<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Asset Hub — S.Facilities</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--white:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--dim:#9ca3af;
  --cyan:#0ea5e9;--cyan-d:#0284c7;--cyan-l:#e0f2fe;
  --violet:#7c3aed;--red:#ef4444;--red-l:#fee2e2;--red-d:#dc2626;
  --amber:#f59e0b;--amber-l:#fef3c7;--amber-d:#d97706;
  --green:#10b981;--green-l:#d1fae5;--green-d:#059669;
  --blue:#3b82f6;--orange:#f97316;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade{animation:fadeUp .3s ease}
header{background:var(--white);border-bottom:1px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:flex;align-items:center;justify-content:center;font-size:.8rem}
.logo-text{font-weight:900;font-size:.9rem}.logo-text span{color:var(--cyan)}
.logo-sub{font-size:10px;color:var(--muted);margin-left:3px}
nav{display:flex;gap:2px}
.nb{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:12px;background:transparent;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s}
.nb.on{background:var(--cyan-l);color:var(--cyan-d);border-bottom-color:var(--cyan)}
.hdr-r{display:flex;align-items:center;gap:.5rem}
.btn{padding:.4rem .9rem;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:12px;transition:all .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bp{background:var(--cyan);color:#fff}.bs{background:var(--green-l);color:var(--green-d);border:1px solid #a7f3d0}.bg{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
main{flex:1;padding:1.25rem 1.5rem;max-width:1440px;margin:0 auto;width:100%}
.pg-title{font-size:1.15rem;font-weight:800;letter-spacing:-.02em}
.pg-sub{color:var(--muted);font-size:12px;margin-top:2px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:.75rem;margin-bottom:1.25rem}
.kpi{background:var(--white);border-radius:12px;padding:1rem 1.1rem;border:1px solid var(--border);border-left:4px solid;position:relative;overflow:hidden;transition:all .15s}
.kpi.click{cursor:pointer}.kpi.click:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.kpi-ico{font-size:1.4rem;margin-bottom:.4rem}
.kpi-v{font-size:26px;font-weight:900;letter-spacing:-.03em;line-height:1}
.kpi-l{font-size:11px;color:var(--muted);margin-top:5px;font-weight:500;line-height:1.4}
.kpi-s{font-size:11px;margin-top:3px;font-weight:700}
.alert{border-radius:10px;padding:.85rem 1.1rem;display:flex;align-items:center;gap:.85rem;flex-wrap:wrap;margin-bottom:1.25rem;border:1px solid}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:.65rem;display:flex;align-items:center;gap:.4rem}
.sl::after{content:"";flex:1;height:1px;background:var(--border)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.7rem;margin-bottom:1.25rem}
.card{background:var(--white);border-radius:10px;padding:.85rem 1rem;border:1px solid var(--border);border-left:3px solid;cursor:pointer;transition:all .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.07)}
.card-icon{font-size:1.15rem;margin-bottom:3px}.card-name{font-weight:700;font-size:.76rem;margin-bottom:2px}
.card-n{font-size:18px;font-weight:900;color:var(--text);margin:3px 0;letter-spacing:-.02em}.card-s{font-size:11px;color:var(--muted)}
.tw{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.25rem}
.th{padding:.75rem 1.1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;background:#fafafa}
.th-t{font-weight:700;font-size:.82rem}.th-s{font-size:11px;color:var(--muted)}
.ts{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{background:#f9fafb}
th{padding:8px 12px;text-align:left;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;font-weight:600}
td{padding:9px 12px;border-bottom:1px solid rgba(229,231,235,.5);font-size:13px;white-space:nowrap}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:#f9fafb}
.mono{font-family:monospace;font-size:12px}
.fb{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
input[type=text],select{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:.42rem .8rem;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .15s}
input[type=text]:focus,select:focus{border-color:var(--cyan)}
input[type=text]{flex:1;min-width:180px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.prog-wrap{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-top:4px}
.prog{height:6px;border-radius:4px;transition:width .5s}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:500;padding:1rem}
.mb{background:var(--white);border-radius:14px;padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.15);animation:fadeUp .2s ease}
.mr{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid var(--border)}
.mk{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.mv{font-size:13px;font-weight:600}
.toast{position:fixed;bottom:1.3rem;right:1.3rem;background:var(--white);border-radius:10px;padding:.65rem 1rem;font-size:13px;font-weight:600;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.12);border:1px solid var(--border)}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:300}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--cyan);animation:spin .7s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════ CONFIG — URLs dos teus Google Sheets ═══════════════
const RAW_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTl6ug8Znm_BoudPKLVUNv9ptpxR9VFKgpInA_nQIT02_mzbPfCsPLKSQjTzDuV8w/pub?gid=214853524&single=true&output=csv";
const BMS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTl6ug8Znm_BoudPKLVUNv9ptpxR9VFKgpInA_nQIT02_mzbPfCsPLKSQjTzDuV8w/pub?gid=2070565508&single=true&output=csv";
const AVG_VAL = 800; // € valor médio por equipamento

// ═══════════════ META ═══════════════
const LOC_M={"WAHA":{i:"🏠",c:"#10b981"},"EDIFICIOS":{i:"🏢",c:"#0ea5e9"},"ARMAZÉM":{i:"📦",c:"#f59e0b"},"AVT":{i:"🏭",c:"#7c3aed"},"STAGING":{i:"🔧",c:"#f97316"},"WAREHOUSE":{i:"🏗️",c:"#3b82f6"},"APARTAMENTOS":{i:"🛋️",c:"#ec4899"}};
const TYPE_M={"Monitor":{i:"📺",c:"#ec4899"},"Portátil":{i:"💻",c:"#0ea5e9"},"Desktop":{i:"🖥️",c:"#7c3aed"},"MiniPC":{i:"🖱️",c:"#06b6d4"},"Thin Client":{i:"📦",c:"#64748b"},"Tablets":{i:"📱",c:"#8b5cf6"},"Routers":{i:"📡",c:"#f97316"},"Secretária":{i:"🪑",c:"#84cc16"},"Docks":{i:"🔌",c:"#94a3b8"}};

// ═══════════════ STATE ═══════════════
const S={tab:"overview",raw:[],bms:[],lastSync:null,loading:false,search:"",locF:"all",typeF:"all",wahF:"all",selected:null,toast:null};

// ═══════════════ CSV FETCH — usa proxy CORS para evitar bloqueio ═══════════════
async function fetchCSV(url){
  // Tenta directo primeiro, se falhar usa proxy
  const proxies=[
    url, // directo
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  ];
  for(const u of proxies){
    try{
      const r=await fetch(u,{cache:"no-cache"});
      if(!r.ok) continue;
      const txt=await r.text();
      if(txt.length>100) return parseCSV(txt);
    }catch(e){}
  }
  throw new Error("Não foi possível carregar os dados. Verifica se o Google Sheets está publicado.");
}

function parseCSV(txt){
  const lines=txt.split("\n").map(l=>l.trim()).filter(l=>l);
  if(lines.length<2) return[];
  const headers=csvSplit(lines[0]).map(h=>h.replace(/^"|"$/g,"").trim());
  return lines.slice(1).map(line=>{
    const vals=csvSplit(line).map(v=>v.replace(/^"|"$/g,"").trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=vals[i]||"");
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}

function csvSplit(line){
  const res=[];let cur="";let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur);cur="";}
    else cur+=c;
  }
  res.push(cur);return res;
}

// ═══════════════ SYNC ═══════════════
async function sync(){
  S.loading=true;draw();
  try{
    const[raw,bms]=await Promise.all([
      fetchCSV(RAW_URL),
      fetchCSV(BMS_URL).catch(()=>[])
    ]);
    S.raw=raw;S.bms=bms;S.lastSync=new Date();
    showToast(raw.length.toLocaleString()+" assets carregados ✓");
  }catch(e){
    showToast(e.message,true);
  }
  S.loading=false;draw();
}

// ═══════════════ COMPUTED STATS ═══════════════
function compute(){
  const d=S.raw;
  if(!d.length) return null;

  // BMS lookup por Contract_EndDate
  const bmsMap={};
  S.bms.forEach(b=>{
    const k=b["BMS"]||b["WAH ID"]||b["ID"]||"";
    if(k) bmsMap[k]=b;
  });

  const byLoc={},byWah={},byType={};
  d.forEach(r=>{
    const loc=(r["LOCATION TYPE"]||"").trim()||"N/A";
    const wah=(r["WAH STATUS"]||"").trim()||"N/A";
    const typ=(r["ASSET TYPE"]||"").trim()||"N/A";
    byLoc[loc]=(byLoc[loc]||0)+1;
    byWah[wah]=(byWah[wah]||0)+1;
    byType[typ]=(byType[typ]||0)+1;
  });

  const terminated=d.filter(r=>(r["WAH STATUS"]||"").trim()==="Terminated");

  // Users Terminated with Assets — agrupados por BMS
  const userMap={};
  terminated.forEach(r=>{
    const uid=(r["BMS"]||r["Local"]||r["ASSET ID"]||"").trim();
    if(!userMap[uid]) userMap[uid]={uid,local:r["Local"]||"",assets:[],retention:r["RETENTION STATUS"]||"",exitDate:""};
    userMap[uid].assets.push(r);
    // pega Contract_EndDate do BMS
    if(!userMap[uid].exitDate){
      const bRow=bmsMap[uid];
      if(bRow&&bRow["Contract_EndDate"]) userMap[uid].exitDate=bRow["Contract_EndDate"];
    }
    if((r["RETENTION STATUS"]||"")&&r["RETENTION STATUS"]!=="#N/A") userMap[uid].retention=r["RETENTION STATUS"];
  });
  const users=Object.values(userMap).sort((a,b)=>b.assets.length-a.assets.length);

  // Users in Recovery Process = tem RETENTION STATUS diferente de #N/A e não vazio
  const inRecovery=users.filter(u=>{
    const ret=(u.retention||"").trim();
    return ret&&ret!=="#N/A"&&ret.toLowerCase()!=="terminated"&&ret.toLowerCase()!=="active";
  });

  // Value per month
  const byMonth={};let totalVal=0;
  terminated.forEach(r=>{
    const bRow=bmsMap[(r["BMS"]||"").trim()];
    const ed=bRow&&bRow["Contract_EndDate"]?bRow["Contract_EndDate"]:"";
    totalVal+=AVG_VAL;
    if(ed){
      try{
        const dt=new Date(ed);
        if(!isNaN(dt)){
          const k=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}`;
          byMonth[k]=(byMonth[k]||0)+AVG_VAL;
        }
      }catch{}
    }
  });

  const wahActive=byWah["Active"]||0;
  const wahTerm=byWah["Terminated"]||0;
  const recRate=users.length?Math.round(inRecovery.length/users.length*100):0;

  return{total:d.length,byLoc,byWah,byType,byMonth,totalVal,wahActive,wahTerm,
    terminated,users,usersCount:users.length,inRecovery,inRecoveryCount:inRecovery.length,recRate,bmsMap};
}

function getFiltered(){
  return S.raw.filter(r=>{
    if(S.locF!=="all"&&(r["LOCATION TYPE"]||"").trim()!==S.locF) return false;
    if(S.typeF!=="all"&&(r["ASSET TYPE"]||"").trim()!==S.typeF) return false;
    if(S.wahF!=="all"&&(r["WAH STATUS"]||"").trim()!==S.wahF) return false;
    const q=S.search.toLowerCase();
    return !q||["ASSET ID","ASSET TYPE","SERIAL NUMBER","Local","LOCATION TYPE","WAH STATUS","RETENTION STATUS","BMS"].some(k=>(r[k]||"").toLowerCase().includes(q));
  });
}

// ═══════════════ HELPERS ═══════════════
function set(p,r=true){Object.assign(S,p);if(r)draw();}
function showToast(msg,err=false){S.toast={msg,err};draw();setTimeout(()=>{S.toast=null;draw();},3500);}
function ts(){return S.lastSync?S.lastSync.toLocaleTimeString("pt-PT"):"—";}
function euro(v){return"€"+Math.round(v).toLocaleString("pt-PT");}
function fmt(d){if(!d||d==="#N/A"||d==="0")return"—";try{const dt=new Date(d);return isNaN(dt)?"—":dt.toLocaleDateString("pt-PT");}catch{return d;}}
function daysSince(d){if(!d||d==="#N/A")return null;try{const ms=Date.now()-new Date(d).getTime();return Math.floor(ms/86400000);}catch{return null;}}

function wbdg(v){
  const m={"Active":["#d1fae5","#059669"],"Terminated":["#fee2e2","#dc2626"]};
  const[bg,c]=m[v]||["#f3f4f6","#9ca3af"];
  return`<span class="badge" style="background:${bg};color:${c}">${v||"—"}</span>`;
}
function rbdg(v){
  const s=(v||"").trim();
  if(!s||s==="#N/A") return`<span class="badge" style="background:#f3f4f6;color:#9ca3af">#N/A</span>`;
  if(s.toLowerCase().includes("recup")) return`<span class="badge" style="background:#d1fae5;color:#059669">${s}</span>`;
  if(s.toLowerCase().includes("pend")) return`<span class="badge" style="background:#fef3c7;color:#d97706">${s}</span>`;
  return`<span class="badge" style="background:#fee2e2;color:#dc2626">${s}</span>`;
}
function urgBdg(days){
  if(days===null) return"";
  if(days>90) return`<span class="badge" style="background:#fee2e2;color:#dc2626">🔴 ${days}d</span>`;
  if(days>30) return`<span class="badge" style="background:#fef3c7;color:#d97706">🟡 ${days}d</span>`;
  return`<span class="badge" style="background:#d1fae5;color:#059669">🟢 ${days}d</span>`;
}
function lpill(l){const m=LOC_M[l]||{i:"📍",c:"#6b7280"};return`<span style="color:${m.c};font-weight:600;font-size:12px">${m.i} ${l||"—"}</span>`;}
function tpill(t){const m=TYPE_M[t]||{i:"📦",c:"#6b7280"};return`<span style="color:${m.c};font-weight:600;font-size:12px">${m.i} ${t||"—"}</span>`;}

// ═══════════════ RENDER ═══════════════
function draw(){
  document.getElementById("root").innerHTML=rDash();
  const c=document.getElementById("cm");if(c)c.scrollTop=c.scrollHeight;
}

function rDash(){
  const st=compute();
  const TABS=[["overview","📊 Overview"],["terminated","🚨 Terminated"],["assets","📦 Assets"]];
  const subs={
    overview:st?`${st.total.toLocaleString()} assets · ${st.usersCount} users Terminated · atualizado ${ts()}`:"A carregar...",
    terminated:st?`${st.usersCount} users · ${st.terminated.length} equipamentos · ${st.inRecoveryCount} em recuperação`:"",
    assets:`${getFiltered().length.toLocaleString()} de ${S.raw.length.toLocaleString()} assets`,
  };
  return`
<header>
  <div class="logo">
    <div class="logo-icon">📡</div>
    <div class="logo-text">Asset<span>Hub</span></div>
    <span class="logo-sub">S.Facilities</span>
  </div>
  <nav>${TABS.map(([t,l])=>`<button class="nb${S.tab===t?" on":""}" onclick="G.tab('${t}')">${l}</button>`).join("")}</nav>
  <div class="hdr-r">
    ${S.lastSync?`<span style="width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;box-shadow:0 0 0 2px #d1fae5"></span><span style="font-size:11px;color:var(--muted)">${ts()}</span>`:""}
    <button class="btn bs" onclick="G.sync()" ${S.loading?"disabled":""}>
      <span style="${S.loading?"display:inline-block;animation:spin .8s linear infinite":""}">↺</span> Sync
    </button>
  </div>
</header>
<main>
  <div style="margin-bottom:1.1rem" class="fade">
    <div class="pg-title">${TABS.find(t=>t[0]===S.tab)?.[1]||""}</div>
    <div class="pg-sub">${subs[S.tab]||""}</div>
  </div>
  <div class="fade">
    ${S.raw.length===0&&!S.loading?rEmpty():S.tab==="overview"?rOverview(st):S.tab==="terminated"?rTerminated(st):rAssets()}
  </div>
</main>
${S.loading?`<div class="loading-overlay"><div class="spinner"></div><div style="font-size:13px;color:var(--muted)">A carregar dados...</div></div>`:""}
${S.selected?rModal(S.selected):""}
${S.toast?`<div class="toast" style="border-color:${S.toast.err?"var(--red)":"var(--green)"}">${S.toast.err?"❌":"✅"} ${S.toast.msg}</div>`:""}`;
}

function rEmpty(){
  return`<div style="text-align:center;padding:4rem 2rem;color:var(--muted)">
    <div style="font-size:3rem;margin-bottom:1rem">📭</div>
    <div style="font-size:1rem;font-weight:700;color:var(--text);margin-bottom:.5rem">Sem dados carregados</div>
    <div style="font-size:13px;margin-bottom:1.5rem">Clica em Sync para carregar os dados do Google Sheets</div>
    <button class="btn bp" onclick="G.sync()">↺ Carregar Dados</button>
  </div>`;
}

// ═══ OVERVIEW ═══
function rOverview(st){
  if(!st) return rEmpty();

  // KPI cards — exactamente os pedidos
  const kpis=[
    {l:"Assets per Location",sub:"total inventário",v:st.total.toLocaleString(),c:"#0ea5e9",bc:"#0ea5e9",i:"📦"},
    {l:"Assets per WAH Active",sub:"colaboradores activos",v:st.wahActive.toLocaleString(),c:"#059669",bc:"#10b981",i:"✅"},
    {l:"Assets per WAH Terminated",sub:"equipamentos de saídas",v:st.wahTerm.toLocaleString(),c:"#dc2626",bc:"#ef4444",i:"🚪",click:"terminated"},
    {l:"Users Terminated with Assets",sub:"utilizadores com equipamentos",v:st.usersCount,c:"#dc2626",bc:"#ef4444",i:"👤",click:"terminated"},
    {l:"Users Terminated in Recovery",sub:"em processo de devolução",v:st.inRecoveryCount,c:"#d97706",bc:"#f59e0b",i:"🔄",click:"terminated"},
    {l:"Value Retained — Total",sub:"valor estimado retido",v:euro(st.totalVal),c:"#f97316",bc:"#f97316",i:"💰",small:true},
    {l:"Value Retained — Média/Mês",sub:"baseado em "+euro(AVG_VAL)+" por asset",v:euro(Math.round(st.totalVal/Math.max(Object.keys(st.byMonth).length,1))),c:"#7c3aed",bc:"#7c3aed",i:"📈",small:true},
  ];

  // Progresso recuperação
  const total=st.usersCount||1;
  const recPct=Math.round(st.inRecoveryCount/total*100);
  const pendPct=Math.round((st.users.filter(u=>!(u.retention||"").trim()||(u.retention||"")==="#N/A").length)/total*100);

  // Por localização
  const locCards=Object.entries(st.byLoc).filter(([l])=>l!=="N/A"&&l!=="#N/A").sort((a,b)=>b[1]-a[1]).map(([loc,n])=>{
    const m=LOC_M[loc]||{i:"📍",c:"#6b7280"};
    const term=st.terminated.filter(r=>(r["LOCATION TYPE"]||"").trim()===loc).length;
    return`<div class="card" style="border-left-color:${m.c}" onclick="G.locF('${loc}')">
      <div class="card-icon">${m.i}</div><div class="card-name" style="color:${m.c}">${loc}</div>
      <div class="card-n">${n.toLocaleString()}</div>
      <div class="card-s">${term?`<b style="color:#dc2626">${term} terminated</b>`:"todos ativos"}</div>
    </div>`;
  }).join("");

  // Por tipo
  const typeCards=Object.entries(st.byType).filter(([t])=>t!=="N/A"&&t!=="#N/A").sort((a,b)=>b[1]-a[1]).slice(0,8).map(([type,n])=>{
    const m=TYPE_M[type]||{i:"📦",c:"#6b7280"};
    const term=st.terminated.filter(r=>(r["ASSET TYPE"]||"").trim()===type).length;
    return`<div class="card" style="border-left-color:${m.c}" onclick="G.typeF('${type}')">
      <div class="card-icon">${m.i}</div><div class="card-name" style="color:${m.c}">${type}</div>
      <div class="card-n">${n.toLocaleString()}</div>
      <div class="card-s">${term?`<span style="color:#dc2626">${term} term.</span>`:"0 term."}</div>
    </div>`;
  }).join("");

  // Gráfico valor por mês
  const months=Object.entries(st.byMonth).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);
  const maxM=Math.max(...months.map(e=>e[1]),1);

  return`
  <div class="kpi-grid">
    ${kpis.map(k=>`<div class="kpi${k.click?" click":""}" style="border-left-color:${k.bc}" ${k.click?`onclick="G.tab('${k.click}')"`:""}
      onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
      <div class="kpi-ico">${k.i}</div>
      <div class="kpi-v" style="color:${k.c};font-size:${k.small?"18px":"26px"}">${k.v}</div>
      <div class="kpi-l">${k.l}<br><span style="font-size:10px;opacity:.7">${k.sub}</span></div>
      ${k.click?`<div class="kpi-s" style="color:${k.c}">ver lista →</div>`:""}
    </div>`).join("")}
  </div>

  ${st.wahTerm>0?`<div class="alert" style="background:#fffbeb;border-color:#fbbf24">
    <span style="font-size:1.4rem">🚨</span>
    <div style="flex:1">
      <div style="font-weight:700;color:#92400e;font-size:.83rem">${st.wahTerm} equipamentos por recuperar de ${st.usersCount} colaboradores Terminated</div>
      <div style="color:var(--muted);font-size:12px;margin-top:2px">${st.inRecoveryCount} em processo de recuperação · valor estimado retido: ${euro(st.totalVal)}</div>
    </div>
    <button class="btn" style="background:#f59e0b;color:#fff;flex-shrink:0" onclick="G.tab('terminated')">Gerir →</button>
  </div>`:""}

  <!-- Progresso -->
  <div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.25rem">
    <div style="font-weight:700;font-size:.82rem;margin-bottom:.85rem">📊 Progresso de Recuperação</div>
    <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
      ${[{l:"Em Recuperação",v:st.inRecoveryCount,pct:recPct,c:"#10b981"},{l:"Sem Acção",v:st.users.filter(u=>!(u.retention||"").trim()||(u.retention||"")==="#N/A").length,pct:pendPct,c:"#f59e0b"}].map(x=>`
      <div style="flex:1;min-width:140px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:11px;color:var(--muted)">${x.l}</span>
          <span style="font-size:11px;font-weight:700;color:${x.c}">${x.v} (${x.pct}%)</span>
        </div>
        <div class="prog-wrap"><div class="prog" style="width:${x.pct}%;background:${x.c}"></div></div>
      </div>`).join("")}
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:.75rem">Total Terminated: <b>${st.usersCount}</b> utilizadores com <b>${st.terminated.length}</b> equipamentos</div>
  </div>

  ${months.length?`
  <div class="sl">Value Retained per Month</div>
  <div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;margin-bottom:1.25rem">
    <div style="display:flex;align-items:flex-end;gap:10px;height:90px;margin-bottom:.5rem">
      ${months.map(([m,v])=>{
        const pct=Math.round(v/maxM*100);
        const lbl=m.split("-").reverse().join("/");
        return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
          <div style="font-size:10px;color:var(--muted);font-weight:600">${euro(v)}</div>
          <div style="width:100%;background:#7c3aed;border-radius:4px 4px 0 0;height:${Math.max(pct*.7,5)}px;opacity:.8"></div>
          <div style="font-size:10px;color:var(--muted)">${lbl}</div>
        </div>`;
      }).join("")}
    </div>
    <div style="font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:.5rem">
      Total acumulado: <b style="color:var(--text)">${euro(st.totalVal)}</b> · valor médio por asset: <b>${euro(AVG_VAL)}</b>
    </div>
  </div>`:""}

  <div class="sl">Assets per Location (WAH)</div>
  <div class="card-grid">${locCards||'<p style="color:var(--muted);font-size:13px">Sem dados</p>'}</div>
  <div class="sl">Assets por Tipo</div>
  <div class="card-grid">${typeCards||'<p style="color:var(--muted);font-size:13px">Sem dados</p>'}</div>`;
}

// ═══ TERMINATED ═══
function rTerminated(st){
  if(!st) return rEmpty();

  const userRows=st.users.map(u=>{
    const days=daysSince(u.exitDate);
    const types=[...new Set(u.assets.map(a=>(a["ASSET TYPE"]||"").trim()))].filter(Boolean);
    const locs=[...new Set(u.assets.map(a=>(a["LOCATION TYPE"]||"").trim()))].filter(Boolean);
    return`<tr onclick="G.selUser('${u.uid.replace(/'/g,"\\'")}')">
      <td class="mono" style="color:#0284c7;font-weight:700">${u.uid||"—"}</td>
      <td>${u.local||"—"}</td>
      <td><b>${u.assets.length}</b></td>
      <td style="font-size:12px">${types.join(", ")||"—"}</td>
      <td>${locs.map(l=>lpill(l)).join(" ")||"—"}</td>
      <td>${fmt(u.exitDate)}</td>
      <td>${urgBdg(days)}</td>
      <td>${rbdg(u.retention)}</td>
    </tr>`;
  }).join("");

  const assetRows=st.terminated.map(r=>{
    const bRow=st.bmsMap[(r["BMS"]||"").trim()];
    const ed=bRow&&bRow["Contract_EndDate"]?bRow["Contract_EndDate"]:"";
    const days=daysSince(ed);
    return`<tr onclick="G.sel('${(r["ASSET ID"]||"").replace(/'/g,"\\'")}')">
      <td class="mono" style="color:#0284c7;font-weight:700">${r["ASSET ID"]||"—"}</td>
      <td>${tpill(r["ASSET TYPE"])}</td>
      <td class="mono" style="color:var(--muted)">${r["SERIAL NUMBER"]||"—"}</td>
      <td style="color:var(--muted)">${r["BMS"]||"—"}</td>
      <td>${r["Local"]||"—"}</td>
      <td>${lpill((r["LOCATION TYPE"]||"").trim())}</td>
      <td>${fmt(ed)}</td>
      <td>${urgBdg(days)}</td>
      <td>${rbdg(r["RETENTION STATUS"])}</td>
    </tr>`;
  }).join("");

  return`
  <div class="kpi-grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr))">
    ${[
      {l:"Users Terminated with Assets",v:st.usersCount,c:"#dc2626",bc:"#ef4444",i:"👤"},
      {l:"Total Equipamentos",v:st.terminated.length,c:"#dc2626",bc:"#ef4444",i:"📦"},
      {l:"Users in Recovery Process",v:st.inRecoveryCount,c:"#d97706",bc:"#f59e0b",i:"🔄"},
      {l:"Value Retained Total",v:euro(st.totalVal),c:"#f97316",bc:"#f97316",i:"💰",small:true},
    ].map(k=>`<div class="kpi" style="border-left-color:${k.bc}">
      <div class="kpi-ico">${k.i}</div>
      <div class="kpi-v" style="color:${k.c};font-size:${k.small?"18px":"26px"}">${k.v}</div>
      <div class="kpi-l">${k.l}</div>
    </div>`).join("")}
  </div>

  <div class="tw" style="border-top:3px solid #ef4444">
    <div class="th">
      <span class="th-t">👤 Users Terminated com Equipamentos + Data de Rescisão</span>
      <span class="th-s">${st.usersCount} utilizadores · ${st.terminated.length} assets</span>
    </div>
    <div class="ts"><table>
      <thead><tr><th>BMS ID</th><th>Local</th><th>Nº Assets</th><th>Tipos</th><th>Localização</th><th>Data Rescisão</th><th>Dias</th><th>Retention</th></tr></thead>
      <tbody>${userRows||'<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:1.5rem">Sem dados Terminated.</td></tr>'}</tbody>
    </table></div>
  </div>

  <div class="tw" style="border-top:3px solid #f59e0b">
    <div class="th">
      <span class="th-t">📦 Equipamentos Terminated — Detalhe por Asset</span>
      <span class="th-s">${st.terminated.length} assets</span>
    </div>
    <div class="ts"><table>
      <thead><tr><th>Asset ID</th><th>Tipo</th><th>Serial</th><th>BMS</th><th>Local</th><th>Localização</th><th>Data Rescisão</th><th>Dias</th><th>Retention</th></tr></thead>
      <tbody>${assetRows||'<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:1.5rem">Sem assets Terminated.</td></tr>'}</tbody>
    </table></div>
  </div>`;
}

// ═══ ASSETS ═══
function rAssets(){
  const f=getFiltered();
  const locs=[...new Set(S.raw.map(r=>(r["LOCATION TYPE"]||"").trim()).filter(v=>v&&v!=="N/A"&&v!=="#N/A"))];
  const types=[...new Set(S.raw.map(r=>(r["ASSET TYPE"]||"").trim()).filter(v=>v&&v!=="N/A"&&v!=="#N/A"))];
  const rows=f.map(r=>`<tr onclick="G.sel('${(r["ASSET ID"]||"").replace(/'/g,"\\'")}')">
    <td class="mono" style="color:#0284c7;font-weight:700">${r["ASSET ID"]||"—"}</td>
    <td>${tpill((r["ASSET TYPE"]||"").trim())}</td>
    <td class="mono" style="color:var(--muted)">${r["SERIAL NUMBER"]||"—"}</td>
    <td style="color:var(--muted)">${r["Local"]||"—"}</td>
    <td>${lpill((r["LOCATION TYPE"]||"").trim())}</td>
    <td>${wbdg((r["WAH STATUS"]||"").trim())}</td>
    <td>${rbdg(r["RETENTION STATUS"])}</td>
    <td style="color:var(--muted);font-size:11px">${r["Life Cicle"]||"—"}</td>
  </tr>`).join("");
  return`
  <div class="fb">
    <input type="text" placeholder="🔍  Asset ID, Serial, Local, BMS..." value="${S.search}" oninput="G.search(this.value)"/>
    <select onchange="G.locF(this.value)">
      <option value="all"${S.locF==="all"?" selected":""}>Todas as localizações</option>
      ${locs.map(l=>`<option value="${l}"${S.locF===l?" selected":""}>${l}</option>`).join("")}
    </select>
    <select onchange="G.typeF(this.value)">
      <option value="all"${S.typeF==="all"?" selected":""}>Todos os tipos</option>
      ${types.map(t=>`<option value="${t}"${S.typeF===t?" selected":""}>${t}</option>`).join("")}
    </select>
    <select onchange="G.wahF(this.value)">
      <option value="all"${S.wahF==="all"?" selected":""}>WAH Status</option>
      <option value="Active"${S.wahF==="Active"?" selected":""}>Active</option>
      <option value="Terminated"${S.wahF==="Terminated"?" selected":""}>Terminated</option>
    </select>
    <button class="btn bg" onclick="G.reset()">↺</button>
    <span style="font-size:11px;color:var(--muted);white-space:nowrap">${f.length.toLocaleString()} assets</span>
  </div>
  <div class="tw"><div class="ts"><table>
    <thead><tr><th>Asset ID</th><th>Tipo</th><th>Serial</th><th>Local</th><th>Localização</th><th>WAH Status</th><th>Retention</th><th>Life Cycle</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:1.5rem">Nenhum resultado.</td></tr>'}</tbody>
  </table></div></div>`;
}

// ═══ MODAL ═══
function rModal(a){
  if(a._isUser){
    const st=compute();
    const rows=a.assets.map(r=>`<div style="background:#f9fafb;border-radius:8px;padding:.6rem .85rem;margin-bottom:.4rem">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="mono" style="color:#0284c7;font-weight:700;font-size:12px">${r["ASSET ID"]||"—"}</span>
        ${tpill((r["ASSET TYPE"]||"").trim())}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">S/N: ${r["SERIAL NUMBER"]||"—"} · ${(r["LOCATION TYPE"]||"").trim()||"—"}</div>
    </div>`).join("");
    return`<div class="ov" onclick="G.sel(null)"><div class="mb" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">
        <div><div style="font-size:1.4rem;margin-bottom:3px">👤</div>
          <div style="font-weight:800;font-size:.95rem">${a.uid}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${a.local||"—"} · ${a.assets.length} equipamentos · rescisão: ${fmt(a.exitDate)}</div>
        </div>
        <span class="badge" style="background:#fee2e2;color:#dc2626">Terminated</span>
      </div>
      <div style="font-weight:600;font-size:.78rem;color:var(--muted);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.06em">Equipamentos</div>
      ${rows}
      <button class="btn bg" style="width:100%;margin-top:1rem" onclick="G.sel(null)">Fechar</button>
    </div></div>`;
  }
  const st=compute();
  const bRow=st&&st.bmsMap[(a["BMS"]||"").trim()];
  const ed=bRow&&bRow["Contract_EndDate"]?bRow["Contract_EndDate"]:"";
  const fields=[
    ["Asset ID",a["ASSET ID"]],["Tipo",tpill((a["ASSET TYPE"]||"").trim())],
    ["Descrição",a["Description"]||"—"],["Serial",`<span class="mono">${a["SERIAL NUMBER"]||"—"}</span>`],
    ["Processador",a["Processador"]||"—"],["RAM",(a["Memória RAM (gb)"]||"—")+" GB"],
    ["Local",a["Local"]||"—"],["BMS",a["BMS"]||"—"],
    ["Localização",lpill((a["LOCATION TYPE"]||"").trim())],
    ["Aquisição",fmt(a["Aquisitation date"])],["Life Cycle",a["Life Cicle"]||"—"],
    ["Data Rescisão",fmt(ed)||"—"],["WAH Status",wbdg((a["WAH STATUS"]||"").trim())],
    ["Retention",rbdg(a["RETENTION STATUS"])],
  ];
  return`<div class="ov" onclick="G.sel(null)"><div class="mb" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">
      <div><div style="font-size:1.5rem;margin-bottom:3px">${TYPE_M[(a["ASSET TYPE"]||"").trim()]?.i||"📦"}</div>
        <div style="font-weight:800;font-size:.95rem">${a["ASSET ID"]||"—"}</div>
        <div class="mono" style="font-size:11px;color:var(--muted);margin-top:2px">${a["ASSET TYPE"]||"—"} · ${a["SERIAL NUMBER"]||"—"}</div>
      </div>${wbdg((a["WAH STATUS"]||"").trim())}
    </div>
    ${fields.map(([k,v])=>`<div class="mr"><span class="mk">${k}</span><span class="mv">${v}</span></div>`).join("")}
    <button class="btn bg" style="width:100%;margin-top:1rem" onclick="G.sel(null)">Fechar</button>
  </div></div>`;
}

// ═══════════════ GLOBAL HANDLERS ═══════════════
const G={
  tab:t=>{S.tab=t;S.search="";S.locF="all";S.typeF="all";S.wahF="all";draw();},
  locF:v=>{S.tab="assets";S.locF=v;draw();},
  typeF:v=>{S.tab="assets";S.typeF=v;draw();},
  wahF:v=>{S.wahF=v;draw();},
  search:v=>{S.search=v;draw();},
  reset:()=>{S.search="";S.locF="all";S.typeF="all";S.wahF="all";draw();},
  sel:id=>{
    if(!id){S.selected=null;draw();return;}
    S.selected=S.raw.find(r=>(r["ASSET ID"]||"").trim()===id)||null;draw();
  },
  selUser:uid=>{
    const st=compute();if(!st)return;
    const u=st.users.find(u=>u.uid===uid)||null;
    S.selected=u;draw();
  },
  sync:()=>sync(),
};

// ═══════════════ INIT ═══════════════
draw();
sync();
</script>
</body>
</html>
